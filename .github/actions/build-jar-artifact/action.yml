name: 'Jar Build Steps'
description: 'Checks out code, sets up Java, and runs Gradle build'

inputs:
  module-name:
    description: 'Module name for Gradle build, if empty the root project built script is used'
    default: ''
    required: false
  tag:
    description: 'Release tag for setting image version'
    required: true
  github-token:
    description: 'GitHub token for submodule checkout'
    required: true
  jvm-version:
    description: 'JDK version to install (e.g., 21, 25).'
    required: false
    default: '25'
  jvm-distribution:
    description: 'JDK distribution passed to actions/setup-java.'
    required: false
    default: 'temurin'

runs:
  using: 'composite'
  steps:

    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        token: ${{ inputs.github-token }}

    - name: Install JDK ${{ inputs.jvm-version }} (${{ inputs.jvm-distribution }})
      uses: actions/setup-java@v5
      with:
        java-version: ${{ inputs.jvm-version }}
        distribution: ${{ inputs.jvm-distribution }}
        cache: gradle

    - name: Set Artifact Version
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: |
        echo "Artifact version: $TAG"
        echo "version=$TAG" > gradle.properties

    - name: Gradle Build
      shell: bash
      env:
        MODULE: ${{ inputs.module-name }}
      run: |
        if [[ -z "$MODULE" ]]; then
          ./gradlew build
        else
          ./gradlew ":${MODULE}:build"
        fi
