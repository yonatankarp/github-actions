name: Linters
on:
  workflow_call:
    inputs:
      check_docs:
        type: boolean
        required: false
        description: Lint all markdown files in the project.
        default: true
      check_style:
        type: boolean
        required: false
        description: Run spotlessCheck.
        default: true
      jvm-version:
        type: string
        required: false
        description: JDK version used to run spotlessCheck.
        default: '25'
      jvm-distribution:
        type: string
        required: false
        description: JDK distribution passed to actions/setup-java.
        default: 'temurin'
      markdown-lint-config:
        type: string
        required: false
        description: Path to a markdown-lint rules.json. Empty uses the bundled default from github-actions/config/markdown-lint/rules.json.
        default: ''

jobs:
  linters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR
        if: ${{ github.actor == 'dependabot[bot]' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: yonatankarp/github-actions/.github/actions/prepare-jvm-build@v2
        with:
          jvm-version: ${{ inputs.jvm-version }}
          jvm-distribution: ${{ inputs.jvm-distribution }}

      - name: Check for Changes
        uses: dorny/paths-filter@v4.0.1
        id: changes
        with:
          filters: |
            source_code:
              - '**/src/**'
              - '**/Dockerfile'
              - '**/build.gradle.kts'
            docs:
              - README.md
              - 'docs/**'

      - name: Resolve markdown-lint config
        id: md-config
        env:
          OVERRIDE: ${{ inputs.markdown-lint-config }}
        run: |
          if [[ -n "$OVERRIDE" ]]; then
            echo "path=$OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            curl -fsSL https://raw.githubusercontent.com/yonatankarp/github-actions/v2/config/markdown-lint/rules.json -o /tmp/markdown-lint-rules.json
            echo "path=/tmp/markdown-lint-rules.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint Documents
        if: ${{ inputs.check_docs && steps.changes.outputs.docs == 'true' }}
        uses: avto-dev/markdown-lint@v1
        with:
          config: ${{ steps.md-config.outputs.path }}
          args: '**/*.md'

      - name: Check for spotlessCheck task
        if: ${{ inputs.check_style && steps.changes.outputs.source_code == 'true' }}
        id: spotless
        shell: bash
        run: |
          if [[ ! -x ./gradlew ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ./gradlew tasks --all --console=plain | grep -q '^spotlessCheck '; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Style
        if: ${{ inputs.check_style && steps.changes.outputs.source_code == 'true' && steps.spotless.outputs.available == 'true' }}
        run: ./gradlew spotlessCheck
