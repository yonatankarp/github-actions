name: Release Docker Image to GHCR
on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
        description: the tag of this release (e.g. for SemVer `1.2.3`)
      image-name:
        type: string
        required: false
        default: ${{ github.repository }}
        description: |
          image name without registry, defaults to <owner>/<repo>
          (final image: ghcr.io/<image-name>)
      dockerfile:
        type: string
        required: false
        default: ./Dockerfile
        description: path to the Dockerfile
      build-context:
        type: string
        required: false
        default: .
        description: docker build context
      platforms:
        type: string
        required: false
        default: linux/amd64,linux/arm64
        description: target platforms for buildx
      latest:
        type: boolean
        required: false
        default: true
        description: also tag the image as `:latest`

jobs:
  image:
    name: Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ inputs.latest }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=min
