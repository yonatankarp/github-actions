name: build

on:
  workflow_call:
    inputs:
      jvm-version:
        type: string
        required: false
        default: '25'
        description: 'JDK version to install (e.g., 21, 25).'
      jvm-distribution:
        type: string
        required: false
        default: 'temurin'
        description: 'JDK distribution passed to actions/setup-java.'
      gradle-module:
        type: string
        required: false
        default: ''
        description: 'Gradle module to build (e.g. :app or :nested:module). Empty runs the root build task.'
      dockerfile-path:
        type: string
        required: false
        default: ''
        description: 'Path to the Dockerfile relative to the repo root. Empty disables the docker build step.'
      image-name:
        type: string
        required: false
        default: ${{ github.event.repository.name }}
        description: 'Docker image name. Sanitized to lowercase before tagging.'
      publish-test-reports:
        type: boolean
        required: false
        default: true
        description: 'Publish JUnit results as a check + upload test/coverage artifacts.'
      submodules:
        type: string
        required: false
        default: 'false'
        description: 'submodules input forwarded to actions/checkout (false, true, recursive).'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.submodules }}

      - name: Resolve Composite Actions Ref
        id: composite-ref
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: echo "ref=${WORKFLOW_REF##*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout Composite Actions
        uses: actions/checkout@v6
        with:
          repository: yonatankarp/github-actions
          ref: ${{ steps.composite-ref.outputs.ref }}
          path: composite-actions
          clean: false

      - uses: ./composite-actions/.github/actions/prepare-jvm-build
        with:
          jvm-version: ${{ inputs.jvm-version }}
          jvm-distribution: ${{ inputs.jvm-distribution }}

      - id: changes
        uses: ./composite-actions/.github/actions/detect-source-changes
        with:
          dockerfile-path: ${{ inputs.dockerfile-path }}

      - if: steps.changes.outputs.source_code == 'true'
        uses: ./composite-actions/.github/actions/gradle-build
        with:
          gradle-module: ${{ inputs.gradle-module }}

      - if: always() && inputs.publish-test-reports
        uses: ./composite-actions/.github/actions/publish-test-reports

      - if: inputs.dockerfile-path != '' && steps.changes.outputs.source_code == 'true'
        uses: ./composite-actions/.github/actions/build-docker-image
        with:
          image-name: ${{ inputs.image-name }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
