name: build

on:
  workflow_call:
    inputs:
      jvm-version:
        type: string
        required: false
        default: '25'
        description: 'JDK version to install (e.g., 21, 25).'
      jvm-distribution:
        type: string
        required: false
        default: 'temurin'
        description: 'JDK distribution passed to actions/setup-java.'
      gradle-module:
        type: string
        required: false
        default: ''
        description: 'Gradle module to build (e.g. :app or :nested:module). Empty runs the root build task.'
      dockerfile-path:
        type: string
        required: false
        default: ''
        description: 'Path to the Dockerfile relative to the repo root. Empty disables the docker build step.'
      image-name:
        type: string
        required: false
        default: ${{ github.event.repository.name }}
        description: 'Docker image name. Sanitized to lowercase before tagging.'
      publish-test-reports:
        type: boolean
        required: false
        default: true
        description: 'Publish JUnit results as a check + upload test/coverage artifacts.'
      coverage:
        type: boolean
        required: false
        default: true
        description: 'Post a coverage comment on the pull request from JaCoCo-format XML reports (works with JaCoCo and Kover). No-op when no reports match, so it is safe on by default; set false to disable entirely.'
      coverage-xml:
        type: string
        required: false
        default: '**/build/reports/jacoco/test/jacocoTestReport.xml'
        description: 'Newline- or comma-separated glob(s) for JaCoCo-format coverage XML reports.'
      submodules:
        type: string
        required: false
        default: 'false'
        description: 'submodules input forwarded to actions/checkout (false, true, recursive).'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.submodules }}

      - uses: yonatankarp/github-actions/.github/actions/prepare-jvm-build@v2
        with:
          jvm-version: ${{ inputs.jvm-version }}
          jvm-distribution: ${{ inputs.jvm-distribution }}

      - id: changes
        uses: yonatankarp/github-actions/.github/actions/detect-source-changes@v2
        with:
          dockerfile-path: ${{ inputs.dockerfile-path }}

      - if: steps.changes.outputs.source_code == 'true'
        uses: yonatankarp/github-actions/.github/actions/gradle-build@v2
        with:
          gradle-module: ${{ inputs.gradle-module }}

      - if: always() && inputs.publish-test-reports
        uses: yonatankarp/github-actions/.github/actions/publish-test-reports@v2
        with:
          check-name: Test Results (${{ inputs.image-name }})
          artifact-name: test-reports-${{ inputs.image-name }}

      - name: Generate coverage summary
        id: coverage
        if: >-
          inputs.coverage
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
          && steps.changes.outputs.source_code == 'true'
        shell: bash
        env:
          COVERAGE_XML: ${{ inputs.coverage-xml }}
          COVERAGE_TITLE: Coverage
          COVERAGE_MARKER: '<!-- jvm-coverage-summary -->'
        run: |
          python3 - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          patterns = [
              p.strip()
              for p in os.environ["COVERAGE_XML"].replace(",", "\n").splitlines()
              if p.strip()
          ]
          files = sorted({f for pat in patterns for f in glob.glob(pat, recursive=True)})

          if not files:
              print("::notice::No coverage XML matched; skipping the coverage comment.")
              raise SystemExit(0)

          title = os.environ["COVERAGE_TITLE"]
          marker = os.environ["COVERAGE_MARKER"]

          def percentage(covered, missed):
              total = covered + missed
              return "n/a" if total == 0 else f"{covered / total * 100:.2f}%"

          def counters(root):
              return {
                  c.attrib["type"]: (int(c.attrib["covered"]), int(c.attrib["missed"]))
                  for c in root.findall("counter")
              }

          metric_order = ["LINE", "BRANCH", "INSTRUCTION", "METHOD", "CLASS"]

          sections = []
          totals = {}
          for path in files:
              root = ET.parse(path).getroot()
              name = root.attrib.get("name") or path
              module = counters(root)
              for counter_type, (covered, missed) in module.items():
                  acc_covered, acc_missed = totals.get(counter_type, (0, 0))
                  totals[counter_type] = (acc_covered + covered, acc_missed + missed)
              metric_rows = [
                  f"| {counter_type.title()} | {percentage(*module[counter_type])} "
                  f"| {module[counter_type][0]} | {module[counter_type][1]} |"
                  for counter_type in metric_order
                  if counter_type in module
              ]
              sections += [
                  f"### {name}",
                  "",
                  "| Metric | Coverage | Covered | Missed |",
                  "| --- | ---: | ---: | ---: |",
                  *metric_rows,
                  "",
              ]

          total_line = totals.get("LINE", (0, 0))
          total_branch = totals.get("BRANCH", (0, 0))
          summary = "\n".join(
              [
                  marker,
                  f"## {title}",
                  "",
                  f"**Total** — Lines {percentage(*total_line)} · "
                  f"Branches {percentage(*total_branch)}",
                  "",
                  *sections,
              ]
          )
          with open("jvm-coverage-summary.md", "w", encoding="utf-8") as handle:
              handle.write(summary)
          PY

          if [[ -f jvm-coverage-summary.md ]]; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment coverage on the pull request
        if: ${{ steps.coverage.outputs.has_reports == 'true' }}
        uses: actions/github-script@v9
        env:
          MARKER: '<!-- jvm-coverage-summary -->'
        with:
          script: |
            const fs = require('fs');
            const marker = process.env.MARKER;
            const body = fs.readFileSync('jvm-coverage-summary.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              ['github-actions', 'github-actions[bot]'].includes(comment.user?.login) &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - if: inputs.dockerfile-path != '' && steps.changes.outputs.source_code == 'true'
        uses: yonatankarp/github-actions/.github/actions/build-docker-image@v2
        with:
          image-name: ${{ inputs.image-name }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
