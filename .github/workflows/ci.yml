name: build

on:
  workflow_call:
    inputs:
      jvm-version:
        type: string
        required: false
        default: '25'
        description: 'JDK version to install (e.g., 21, 25).'
      jvm-distribution:
        type: string
        required: false
        default: 'temurin'
        description: 'JDK distribution passed to actions/setup-java.'
      gradle-module:
        type: string
        required: false
        default: ''
        description: 'Gradle module to build (e.g. :app or :nested:module). Empty runs the root build task.'
      dockerfile-path:
        type: string
        required: false
        default: ''
        description: 'Path to the Dockerfile relative to the repo root. Empty disables the docker build step.'
      image-name:
        type: string
        required: false
        default: ${{ github.event.repository.name }}
        description: 'Docker image name. Sanitized to lowercase before tagging.'
      publish-test-reports:
        type: boolean
        required: false
        default: true
        description: 'Publish JUnit results as a check + upload test/coverage artifacts.'
      coverage:
        type: boolean
        required: false
        default: true
        description: 'Post a coverage comment on the pull request from JaCoCo-format XML reports (works with JaCoCo and Kover). No-op when no reports match, so it is safe on by default; set false to disable entirely.'
      coverage-xml:
        type: string
        required: false
        default: '**/build/reports/jacoco/test/jacocoTestReport.xml'
        description: 'Newline- or comma-separated glob(s) for JaCoCo-format coverage XML reports.'
      submodules:
        type: string
        required: false
        default: 'false'
        description: 'submodules input forwarded to actions/checkout (false, true, recursive).'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: ${{ inputs.submodules }}

      - uses: yonatankarp/github-actions/.github/actions/prepare-jvm-build@v2
        with:
          jvm-version: ${{ inputs.jvm-version }}
          jvm-distribution: ${{ inputs.jvm-distribution }}

      - id: changes
        uses: yonatankarp/github-actions/.github/actions/detect-source-changes@v2
        with:
          dockerfile-path: ${{ inputs.dockerfile-path }}

      - if: steps.changes.outputs.source_code == 'true'
        uses: yonatankarp/github-actions/.github/actions/gradle-build@v2
        with:
          gradle-module: ${{ inputs.gradle-module }}

      - if: always() && inputs.publish-test-reports
        uses: yonatankarp/github-actions/.github/actions/publish-test-reports@v2
        with:
          check-name: Test Results (${{ inputs.image-name }})
          artifact-name: test-reports-${{ inputs.image-name }}

      - name: Coverage comment
        if: >-
          inputs.coverage
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
          && steps.changes.outputs.source_code == 'true'
        uses: yonatankarp/github-actions/.github/actions/jvm-coverage@v2
        with:
          coverage-xml: ${{ inputs.coverage-xml }}

      - if: inputs.dockerfile-path != '' && steps.changes.outputs.source_code == 'true'
        uses: yonatankarp/github-actions/.github/actions/build-docker-image@v2
        with:
          image-name: ${{ inputs.image-name }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
